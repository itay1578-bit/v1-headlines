<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1 HEADLINES — ישראל</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--s:#161616;--s2:#1e1e1e;--b:#282828;--b2:#363636;
  --red:#E8412A;--red2:#c73520;
  --green:#22C55E;--purple:#8B5CF6;
  --t:#f5f5f5;--t2:#c8c8c8;--m:#707070;--m2:#444;--m3:#2a2a2a;
}
body{background:var(--bg);color:var(--t);font-family:'Heebo',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.header{background:var(--red);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:3px solid var(--red2);position:relative;overflow:hidden;min-height:56px}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 12px,rgba(0,0,0,.06) 12px,rgba(0,0,0,.06) 13px);pointer-events:none}
.logo-block{display:flex;align-items:center;gap:12px;padding:10px 0;position:relative;z-index:1}
.logo-svg{width:42px;height:30px;flex-shrink:0;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.4))}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;line-height:1}
.logo-sub{font-family:'IBM Plex Mono',monospace;font-size:8px;color:rgba(255,255,255,.7);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.header-center{display:flex;align-items:center;gap:8px;position:relative;z-index:1;flex:1;justify-content:center;padding:0 20px}
.api-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.7);white-space:nowrap}
.api-input{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:5px 10px;color:#fff;font-size:11px;width:260px;direction:ltr;outline:none;font-family:'IBM Plex Mono',monospace}
.api-save-btn{padding:5px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.25);border-radius:5px;color:#fff;cursor:pointer;font-size:11px;font-family:'Heebo',sans-serif;white-space:nowrap}
.api-save-btn:hover{background:rgba(0,0,0,.5)}
.api-status{font-family:'IBM Plex Mono',monospace;font-size:10px}
.api-status.ok{color:#4ade80}.api-status.no{color:#fca5a5}
.header-right{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.live-ind{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.9);letter-spacing:1.5px}
.live-ind::before{content:'';width:7px;height:7px;border-radius:50%;background:#fff;animation:livepulse 1.8s infinite}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.date-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:4px 9px;color:rgba(255,255,255,.85)}
.refresh-all-btn{padding:6px 14px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:6px}
.refresh-all-btn:hover{background:rgba(0,0,0,.4)}
.last-update{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.6)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite;display:inline-block}

.grid{display:grid;grid-template-columns:repeat(3,1fr);flex:1;overflow:hidden}
.panel{display:flex;flex-direction:column;border-left:1px solid var(--b);overflow:hidden}
.panel:last-child{border-left:none}
.panel-head{padding:10px 14px;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--s);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.panel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.panel-count{font-size:10px;color:var(--m)}
.panel-refresh{padding:3px 9px;background:transparent;border:1px solid var(--b2);border-radius:4px;color:var(--m);font-size:11px;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s}
.panel-refresh:hover{border-color:var(--red);color:var(--red)}
.panel-tabs{display:flex;gap:4px;padding:8px 12px;flex-wrap:wrap;border-bottom:1px solid var(--b);background:var(--bg);flex-shrink:0}
.tab{padding:4px 10px;background:transparent;border:1px solid var(--b2);border-radius:12px;color:var(--m);font-size:11px;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .12s}
.tab:hover{border-color:var(--m2);color:var(--t2)}
.panel-body{flex:1;overflow-y:auto}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.item{padding:11px 14px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s;position:relative}
.item:hover{background:var(--s2)}
.item.is-new{border-right:3px solid var(--red)}
.item-title{font-size:14px;font-weight:600;color:var(--t2);line-height:1.4;margin-bottom:5px}
.item:hover .item-title{color:var(--t)}
.item-meta{display:flex;gap:6px;align-items:center}
.item-src{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--purple)}
.item-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--m2)}
.item-new{font-size:9px;font-weight:800;background:var(--red);color:#fff;padding:1px 5px;border-radius:3px}
.item-copy{position:absolute;left:10px;top:11px;padding:2px 7px;background:var(--s);border:1px solid var(--b2);border-radius:3px;color:var(--m);font-size:10px;cursor:pointer;font-family:'Heebo',sans-serif;opacity:0;transition:opacity .12s}
.item:hover .item-copy{opacity:1}
.item-copy:hover{border-color:var(--purple);color:var(--purple)}

.panel-empty{padding:40px 14px;text-align:center;color:var(--m);font-size:12px;font-family:'IBM Plex Mono',monospace;line-height:2.2;cursor:pointer}
.panel-empty:hover{color:var(--t2)}
.panel-loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px 14px;color:var(--m);font-size:11px;font-family:'IBM Plex Mono',monospace;text-align:center}
.loader{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
.load-step{font-size:10px;color:var(--m2)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;padding:9px 20px;border-radius:7px;font-weight:700;font-size:13px;font-family:'Heebo',sans-serif;transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:200;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="logo-block">
    <svg class="logo-svg" viewBox="0 0 54 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 5L18 33L23 18L28 33L41 5" stroke="rgba(0,0,0,0.4)" stroke-width="11" stroke-linecap="square" stroke-linejoin="miter"/>
      <path d="M35 5V33M42 5H35" stroke="rgba(0,0,0,0.4)" stroke-width="9" stroke-linecap="square"/>
      <path d="M3 3L16 31L21 16L26 31L39 3" stroke="#fff" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter"/>
      <path d="M33 3V31" stroke="#fff" stroke-width="8" stroke-linecap="square"/>
      <path d="M41 3H33" stroke="#fff" stroke-width="8" stroke-linecap="square"/>
    </svg>
    <div>
      <div class="logo-title">HEADLINES</div>
      <div class="logo-sub">כותרות ישראל · חי</div>
    </div>
  </div>

  <div class="header-center">
    <span class="api-label">Anthropic API:</span>
    <input class="api-input" id="api-key-input" type="password" placeholder="sk-ant-api03-...">
    <button class="api-save-btn" onclick="saveApiKey()">שמור</button>
    <span class="api-status" id="api-status">לא הוגדר</span>
  </div>

  <div class="header-right">
    <span class="live-ind">LIVE</span>
    <span class="last-update" id="last-update">—</span>
    <button class="refresh-all-btn" id="refresh-all" onclick="refreshAll()">
      <span id="refresh-spin">↻</span> רענן הכל
    </button>
    <span class="date-pill" id="datebadge"></span>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script>
document.getElementById('datebadge').textContent = new Date().toLocaleDateString('he-IL',{weekday:'short',day:'numeric',month:'long'});

let ANTHROPIC_KEY = localStorage.getItem('v1_anthropic_key') || '';
if (ANTHROPIC_KEY) {
  document.getElementById('api-key-input').value = ANTHROPIC_KEY;
  document.getElementById('api-status').textContent = 'נשמר ✓';
  document.getElementById('api-status').className = 'api-status ok';
}

function saveApiKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k.startsWith('sk-ant-')) {
    document.getElementById('api-status').textContent = 'לא תקין';
    document.getElementById('api-status').className = 'api-status no';
    return;
  }
  ANTHROPIC_KEY = k;
  localStorage.setItem('v1_anthropic_key', k);
  document.getElementById('api-status').textContent = 'נשמר ✓';
  document.getElementById('api-status').className = 'api-status ok';
  showToast('API Key נשמר ✓');
  PANELS.forEach(p => { if (!state[p.id].loaded) fetchPanel(p.id); });
}

const PANELS = [
  {
    id: 'ynet', title: 'ynet', color: '#E8412A',
    tabs: [
      {id:'news',     label:'חדשות',    prompt:'Search ynet.co.il right now. Find 20 of the latest news headlines published today. Return ONLY a valid JSON array, nothing else: [{"title":"כותרת","source":"ynet","url":"https://www.ynet.co.il/...","hoursAgo":1}]'},
      {id:'sport',    label:'ספורט',    prompt:'Search ynet.co.il sports section. Find 20 latest sports headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"ynet ספורט","url":"https://...","hoursAgo":1}]'},
      {id:'celeb',    label:'בידול',    prompt:'Search ynet.co.il entertainment section. Find 20 latest celebrity headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"ynet בידול","url":"https://...","hoursAgo":2}]'},
      {id:'money',    label:'כסף',      prompt:'Search ynet.co.il money section. Find 20 latest financial headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"ynet כסף","url":"https://...","hoursAgo":2}]'}
    ]
  },
  {
    id: 'walla', title: 'walla', color: '#3B82F6',
    tabs: [
      {id:'news',     label:'חדשות',    prompt:'Search walla.co.il news section right now. Find 20 latest news headlines published today. Return ONLY JSON array: [{"title":"כותרת","source":"walla","url":"https://...","hoursAgo":1}]'},
      {id:'sport',    label:'ספורט',    prompt:'Search walla.co.il sport section. Find 20 latest sports headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"walla ספורט","url":"https://...","hoursAgo":1}]'},
      {id:'celeb',    label:'בידור',    prompt:'Search walla.co.il entertainment section. Find 20 latest celebrity headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"walla בידור","url":"https://...","hoursAgo":2}]'},
      {id:'tech',     label:'טק',       prompt:'Search walla.co.il tech section. Find 20 latest technology headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"walla טק","url":"https://...","hoursAgo":2}]'}
    ]
  },
  {
    id: 'n12', title: 'n12 / mako', color: '#8B5CF6',
    tabs: [
      {id:'news',     label:'חדשות',    prompt:'Search n12.co.il and mako.co.il news sections right now. Find 20 latest Israeli news headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"n12","url":"https://...","hoursAgo":1}]'},
      {id:'celeb',    label:'תרבות',    prompt:'Search mako.co.il entertainment section. Find 20 latest celebrity and culture headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"mako","url":"https://...","hoursAgo":2}]'},
      {id:'sport',    label:'ספורט',    prompt:'Search sport5.co.il and n12.co.il sports. Find 20 latest sports headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"sport5","url":"https://...","hoursAgo":1}]'},
      {id:'politics', label:'פוליטיקה', prompt:'Search n12.co.il and walla.co.il political sections. Find 20 latest Israeli political headlines from today. Return ONLY JSON array: [{"title":"כותרת","source":"n12","url":"https://...","hoursAgo":1}]'}
    ]
  }
];

const state = {};
PANELS.forEach(p => {
  state[p.id] = { items: {}, activeTab: p.tabs[0].id, seen: new Set(), loaded: false };
});

const cache = {};

async function fetchClaude(panelId, tab) {
  if (!ANTHROPIC_KEY) return [];
  const cacheKey = panelId + '_' + tab.id;
  const cached = cache[cacheKey];
  if (cached && (Date.now() - cached.time) < 10 * 60 * 1000) return cached.items;

  try {
    console.log('Fetching Claude for', panelId, tab.id);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        tools: [{ type: 'web_search_20250305', name: 'web_search', max_uses: 2 }],
        messages: [{ role: 'user', content: tab.prompt }]
      }),
      signal: AbortSignal.timeout(60000)
    });

    console.log('Claude response status:', res.status, 'for', panelId);
    if (!res.ok) { 
      const errText = await res.text();
      console.warn('Claude error:', res.status, errText);
      return []; 
    }

    const data = await res.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const match = text.match(/\[[\s\S]*?\]/);
    if (!match) return [];

    const items = JSON.parse(match[0]).map(a => ({
      title: a.title || '',
      link: a.url || '',
      pubDate: new Date(Date.now() - (parseFloat(a.hoursAgo) || 1) * 3600000),
      hoursAgo: parseFloat(a.hoursAgo) || 1,
      isValid: true,
      source: a.source || ''
    })).filter(a => a.title.length > 3);

    cache[cacheKey] = { items, time: Date.now() };
    return items;
  } catch(e) {
    console.warn('Fetch error:', e);
    return [];
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function timeLabel(h) {
  if (h < 0.08) return 'עכשיו';
  if (h < 1) return Math.round(h*60) + ' דק';
  if (h < 24) return Math.round(h) + "ש'";
  return Math.round(h/24) + ' ימים';
}

async function fetchPanel(panelId) {
  const panel = PANELS.find(p => p.id === panelId);
  const btn = document.getElementById('btn-' + panelId);
  const body = document.getElementById('body-' + panelId);

  if (!ANTHROPIC_KEY) {
    body.innerHTML = '<div class="panel-empty">הכנס Anthropic API Key בכותרת למעלה</div>';
    return;
  }

  if (btn) btn.classList.add('spinning');
  body.innerHTML = `<div class="panel-loading">
    <div class="loader"></div>
    <div>מחפש ב-${panel.title}…</div>
    <div class="load-step">Claude סורק את האינטרנט</div>
  </div>`;

  const activeTab = panel.tabs.find(t => t.id === state[panelId].activeTab);
  const items = await fetchClaude(panelId, activeTab);
  state[panelId].items[activeTab.id] = items;
  state[panelId].loaded = true;

  if (btn) btn.classList.remove('spinning');
  renderPanel(panelId);
}

function renderPanel(panelId) {
  const panel = PANELS.find(p => p.id === panelId);
  const s = state[panelId];
  const body = document.getElementById('body-' + panelId);
  const countEl = document.getElementById('count-' + panelId);
  const items = s.items[s.activeTab] || [];

  if (countEl) countEl.textContent = items.length || '';

  if (!items.length) {
    body.innerHTML = `<div class="panel-empty" onclick="fetchPanel('${panelId}')">
      לחץ ↻ לטעינת כתבות מ-${panel.title}<br>
      <small style="font-size:10px;color:var(--m2)">מופעל ע"י Claude AI · ~30 שניות</small>
    </div>`;
    return;
  }

  body.innerHTML = items.slice(0, 40).map(item => {
    const id = panelId + '_' + item.title.slice(0, 40);
    const isNew = !s.seen.has(id);
    return `<div class="item${isNew?' is-new':''}" onclick="window.open('${esc(item.link)}','_blank','noopener')">
      <div class="item-title">${esc(item.title)}</div>
      <div class="item-meta">
        ${item.source ? `<span class="item-src">${esc(item.source)}</span>` : ''}
        <span class="item-time">${timeLabel(item.hoursAgo)}</span>
        ${isNew ? '<span class="item-new">NEW</span>' : ''}
      </div>
      <button class="item-copy" onclick="event.stopPropagation();copyText('${esc(item.title).replace(/'/g,"&#39;")}')">העתק</button>
    </div>`;
  }).join('');

  items.forEach(item => s.seen.add(panelId + '_' + item.title.slice(0, 40)));
}

async function setTab(panelId, tabId, btn) {
  state[panelId].activeTab = tabId;
  const panel = PANELS.find(p => p.id === panelId);

  document.querySelectorAll('#tabs-' + panelId + ' .tab').forEach(b => {
    b.style.background = ''; b.style.borderColor = 'var(--b2)'; b.style.color = 'var(--m)';
  });
  btn.style.background = panel.color + '20';
  btn.style.borderColor = panel.color;
  btn.style.color = panel.color;

  if (!state[panelId].items[tabId]) {
    await fetchPanel(panelId);
  } else {
    renderPanel(panelId);
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('הועתק ✓'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

async function refreshAll() {
  const spin = document.getElementById('refresh-spin');
  spin.classList.add('spinning');
  document.getElementById('last-update').textContent = 'מרענן…';
  Object.keys(cache).forEach(k => delete cache[k]);
  for (const p of PANELS) {
    await fetchPanel(p.id);
    await new Promise(r => setTimeout(r, 3000));
  }
  spin.classList.remove('spinning');
  document.getElementById('last-update').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}

function buildGrid() {
  document.getElementById('grid').innerHTML = PANELS.map(panel => `
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <span class="panel-dot" style="background:${panel.color}"></span>
          ${panel.title}
          <span class="panel-count" id="count-${panel.id}"></span>
        </div>
        <button class="panel-refresh" id="btn-${panel.id}" onclick="fetchPanel('${panel.id}')">↻ רענן</button>
      </div>
      <div class="panel-tabs" id="tabs-${panel.id}">
        ${panel.tabs.map((tab, i) => `
          <button class="tab" 
            style="${i===0?`background:${panel.color}20;border-color:${panel.color};color:${panel.color}`:''}"
            onclick="setTab('${panel.id}','${tab.id}',this)">
            ${tab.label}
          </button>`).join('')}
      </div>
      <div class="panel-body" id="body-${panel.id}">
        <div class="panel-empty" onclick="fetchPanel('${panel.id}')">
          לחץ כאן לטעינת כתבות מ-${panel.title}<br>
          <small style="font-size:10px;color:var(--m2)">מופעל ע"י Claude AI</small>
        </div>
      </div>
    </div>`).join('');
}

buildGrid();

// Auto-load if key exists
if (ANTHROPIC_KEY) {
  // Load panels one by one with delay to avoid rate limits
  setTimeout(async () => {
    for (const p of PANELS) {
      await fetchPanel(p.id);
      await new Promise(r => setTimeout(r, 3000)); // 3 second delay between panels
    }
    document.getElementById('last-update').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  }, 1000);
}

// Auto-refresh every 20 minutes
setInterval(() => {
  if (ANTHROPIC_KEY) refreshAll();
}, 20 * 60 * 1000);
</script>
</body>
</html>
