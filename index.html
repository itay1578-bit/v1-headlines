<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{

body{background:var(--bg);color:var(--t);font-family:'Heebo',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
.header{background:var(--red);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:3px solid var(--red2);position:relative;overflow:hidden;min-height:56px}

.header-center{display:flex;align-items:center;gap:8px;position:relative;z-index:1;flex:1;justify-content:center;padding:0 20px}
.api-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.7);white-space:nowrap}
.api-input{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:5px 10px;color:#fff;font-size:11px;width:280px;direction:ltr;outline:none;font-family:'IBM Plex Mono',monospace}
.api-input:focus{border-color:rgba(255,255,255,.5)}
.api-save-btn{padding:5px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.25);border-radius:5px;color:#fff;cursor:pointer;font-size:11px;font-family:'Heebo',sans-serif;white-space:nowrap;transition:all .15s}

.api-status{font-family:'IBM Plex Mono',monospace;font-size:10px;white-space:nowrap}

.header-right{display:flex;align-items:center;gap:10px;position:relative;z-index:1}

.date-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:4px 9px;color:rgba(255,255,255,.85)}

/* PANEL */
.panel{display:flex;flex-direction:column;border-left:1px solid var(--b);overflow:hidden}
.panel:last-child{border-left:none}

.panel-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.item:hover{background:var(--s2)}
.item.is-new{border-right:3px solid var(--red)}

.item-copy{position:absolute;left:10px;top:10px;padding:2px 7px;background:var(--s);border:1px solid var(--b2);border-radius:3px;color:var(--m);font-size:10px;cursor:pointer;font-family:'Heebo',sans-serif;opacity:0;transition:opacity .12s}

.loading-steps{display:flex;flex-direction:column;gap:4px;font-size:10px;color:var(--m2);text-align:right;direction:rtl}

.loading-step .dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;padding:9px 20px;border-radius:7px;font-weight:700;font-size:13px;font-family:'Heebo',sans-serif;transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:200;pointer-events:none}

// RSS fetching with multi-proxy fallback
async function fetchRSS(url) {
  const proxies = [
    async (u) => {
      const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(u), {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      const j = await r.json(); return j.contents || null;
    },
    async (u) => {
      const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(u), {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      const t = await r.text();
      return (t.includes('<rss') || t.includes('<item') || t.includes('<feed')) ? t : null;
    },
    async (u) => {
      const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(u) + '&count=20', {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      if (j.status !== 'ok' || !j.items) throw new Error('bad');
      return j.items.map(item => ({
        title: item.title || '', link: item.link || '',
        pubDate: new Date(item.pubDate || Date.now()),
        hoursAgo: item.pubDate ? (Date.now() - new Date(item.pubDate).getTime()) / 3600000 : 0,
        isValid: !!item.pubDate && new Date(item.pubDate).getFullYear() > 2023, source: ''
      })).filter(i => i.title.length > 2 && i.hoursAgo < 72).sort((a,b) => b.pubDate - a.pubDate);
    }
  ];
  for (const proxyFn of proxies) {
    try {
      const result = await proxyFn(url);
      if (!result) continue;
      if (Array.isArray(result)) return result;
      const parsed = parseXML(result);
      if (parsed.length > 0) return parsed;
    } catch { continue; }
  }
  return [];
}

function parseXML(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');
  const items = [...xml.querySelectorAll('item, entry')];
  const results = [];
  items.slice(0, 25).forEach(item => {
    const title = item.querySelector('title')?.textContent?.trim() || '';
    const link = item.querySelector('link')?.textContent?.trim() || item.querySelector('link')?.getAttribute('href') || '';
    const dateStr = item.querySelector('pubDate, published, updated')?.textContent || '';
    const pubDate = dateStr ? new Date(dateStr) : new Date();
    const isValid = !isNaN(pubDate.getTime()) && pubDate.getFullYear() > 2023;
    const hoursAgo = isValid ? (Date.now() - pubDate.getTime()) / 3600000 : 0;
    if (!title || title.length < 3 || (hoursAgo > 72 && isValid)) return;
    results.push({ title, link, pubDate, hoursAgo, isValid, source: '' });
  });
  return results.sort((a,b) => b.pubDate - a.pubDate);
}

// Claude fetching
const claudeCache = {};
async function fetchClaude(tab, panelId) {
  if (!ANTHROPIC_KEY) return [];

  // Cache 5 minutes
  const cacheKey = tab.id;
  const cached = claudeCache[cacheKey];
  if (cached && (Date.now() - cached.time) < 5 * 60 * 1000) return cached.items;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        tools: [{ type: 'web_search_20250305', name: 'web_search', max_uses: 5 }],
        messages: [{ role: 'user', content: tab.prompt }]
      }),
      signal: AbortSignal.timeout(45000)
    });

    if (!response.ok) {
      console.warn('Claude error:', response.status);
      return [];
    }

    const data = await response.json();
    const fullText = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');

    // Parse JSON from response
    let articles = [];
    const jsonMatch = fullText.match(/\[[\s\S]*\]/);
    if (jsonMatch) {
      try {
        const parsed = JSON.parse(jsonMatch[0]);
        articles = parsed.map(a => ({
          title: a.title || '',
          link: a.url || '',
          pubDate: new Date(Date.now() - (a.hoursAgo || 1) * 3600000),
          hoursAgo: a.hoursAgo || 1,
          isValid: true,
          source: a.source || ''
        })).filter(a => a.title.length > 3);
      } catch(e) {
        console.warn('Parse error:', e);
      }
    }

    claudeCache[cacheKey] = { items: articles, time: Date.now() };
    return articles;
  } catch(e) {
    console.warn('Claude fetch error:', e);
    return [];
  }
}

function timeLabel(h, valid) {
  if (!valid) return '';
  if (h < 0.08) return 'עכשיו';
  if (h < 1) return Math.round(h*60) + ' דק';
  if (h < 24) return Math.round(h) + "ש'";
  return Math.round(h/24) + ' ימים';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  body.innerHTML = `<div class="panel-loading">
    <div class="loading-spinner"></div>
    <div class="loading-steps">${steps.map((s,i) => `<div class="loading-step ${i===0?'active':''}" id="step-${panelId}-${i}"><span class="dot"></span>${s}</div>`).join('')}</div>
  </div>`;
}

function advanceStep(panelId, stepIdx) {
  const prev = document.getElementById('step-' + panelId + '-' + (stepIdx-1));
  const cur = document.getElementById('step-' + panelId + '-' + stepIdx);
  if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
  if (cur) cur.classList.add('active');
}

async function fetchPanel(panelId) {
  const panel = PANELS.find(p => p.id === panelId);
  const btn = document.getElementById('btn-' + panelId);
  const body = document.getElementById('body-' + panelId);
  if (btn) { btn.classList.add('spinning'); btn.disabled = true; }

  if (false) {
    // RSS disabled - all panels use Claude now
  } else {
    // Claude panel - fetch only active tab
    if (!ANTHROPIC_KEY) {
      body.innerHTML = '<div class="panel-empty">נדרש Anthropic API Key<br>הכנס בשדה למעלה</div>';
      if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
      return;
    }
    const activeTabId = state[panelId].activeTab;
    const activeTab = panel.tabs.find(t => t.id === activeTabId) || panel.tabs[0];
    showLoadingSteps(panelId, ['מחפש ברשת…', 'מנתח תוצאות…', 'בונה רשימה…']);
    setTimeout(() => advanceStep(panelId, 1), 8000);
    setTimeout(() => advanceStep(panelId, 2), 20000);
    const items = await fetchClaude(activeTab, panelId);
    state[panelId].items[activeTab.id] = items;
  }

  if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
  renderPanel(panelId);
}

function renderPanel(panelId) {
  const panel = PANELS.find(p => p.id === panelId);
  const s = state[panelId];
  const body = document.getElementById('body-' + panelId);
  const countEl = document.getElementById('count-' + panelId);

  let items = s.items[s.activeTab] || [];

  if (countEl) countEl.textContent = items.length || '';

  if (!items.length) {
    if (panel.type === 'claude' && !ANTHROPIC_KEY) {
      body.innerHTML = '<div class="panel-empty">הכנס Anthropic API Key בכותרת למעלה</div>';
    } else {
      body.innerHTML = '<div class="panel-empty">לא נמצאו פריטים<br>לחץ ↻ לרענון</div>';
    }
    return;
  }

  body.innerHTML = items.slice(0, 50).map(item => {
    const id = panelId + '_' + item.title.slice(0,40);
    const isNew = !s.seen.has(id);
    const tl = timeLabel(item.hoursAgo, item.isValid);
    return `<div class="item${isNew?' is-new':''}" onclick="window.open('${esc(item.link)}','_blank','noopener')">
      <div class="item-title">${esc(item.title)}</div>
      <div class="item-meta">
        ${item.source ? `<span class="item-src">${esc(item.source)}</span>` : ''}
        ${tl ? `<span class="item-time">${tl}</span>` : ''}
        ${isNew ? '<span class="item-new">NEW</span>' : ''}
      </div>
      <button class="item-copy" onclick="event.stopPropagation();copyTitle('${esc(item.title).replace(/'/g,"&#39;")}')">העתק</button>
    </div>`;
  }).join('');

  items.forEach(item => s.seen.add(panelId + '_' + item.title.slice(0,40)));
  state[panelId].everLoaded = true;
}

async function setTab(panelId, tabId, btn) {
  state[panelId].activeTab = tabId;
  const panel = PANELS.find(p => p.id === panelId);

  // Update tab styles
  document.querySelectorAll('#tabs-' + panelId + ' .tab').forEach(b => {
    b.style.background = ''; b.style.borderColor = 'var(--b2)'; b.style.color = 'var(--m)';
  });
  btn.style.background = panel.color + '20';
  btn.style.borderColor = panel.color;
  btn.style.color = panel.color;

  // For Claude panels: fetch if not cached
  if (panel.type === 'claude' && !state[panelId].items[tabId]) {
    const tab = panel.tabs.find(t => t.id === tabId);
    if (tab && ANTHROPIC_KEY) {
      const bodyEl = document.getElementById('body-' + panelId);
      const btn2 = document.getElementById('btn-' + panelId);
      if (btn2) { btn2.classList.add('spinning'); btn2.disabled = true; }
      showLoadingSteps(panelId, ['מחפש ברשת…', 'מנתח תוצאות…', 'בונה רשימה…']);
      setTimeout(() => advanceStep(panelId, 1), 8000);
      setTimeout(() => advanceStep(panelId, 2), 20000);
      const items = await fetchClaude(tab, panelId);
      state[panelId].items[tabId] = items;
      if (btn2) { btn2.classList.remove('spinning'); btn2.disabled = false; }
    }
  }
  renderPanel(panelId);
}

function copyTitle(title) {
  navigator.clipboard.writeText(title).then(() => showToast('הועתק ✓'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

async function refreshAll() {
  const btn = document.getElementById('refresh-all');
  btn.classList.add('spinning'); btn.disabled = true;
  // Refresh all panels sequentially
  for (const p of PANELS) {
    if (Object.keys(state[p.id].items).length > 0 || p.id === 'world-news' || p.id === 'world-celeb') {
      await fetchPanel(p.id);
    }
  }
  btn.classList.remove('spinning'); btn.disabled = false;
  document.getElementById('last-update').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}

function buildGrid() {
  document.getElementById('grid').innerHTML = PANELS.map(panel => `
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <span class="panel-dot" style="background:${panel.color}"></span>
          ${panel.title}
          <span class="panel-count" id="count-${panel.id}"></span>
          ${panel.type==='claude'?'<span class="panel-badge" style="background:'+panel.color+'20;color:'+panel.color+';border:1px solid'+panel.color+'40">AI</span>':''}
        </div>
        <button class="panel-refresh" id="btn-${panel.id}" onclick="fetchPanel('${panel.id}')">↻</button>
      </div>
      <div class="panel-tabs" id="tabs-${panel.id}">
        ${panel.tabs.map((tab, i) => `
          <button class="tab" 
            style="${i===0?`background:${panel.color}20;border-color:${panel.color};color:${panel.color}`:''}"
            onclick="setTab('${panel.id}','${tab.id}',this)">
            ${tab.label}
          </button>`).join('')}
      </div>
      <div class="panel-body" id="body-${panel.id}">
        <div class="panel-empty">לחץ ↻ לטעינה</div>
      </div>
    </div>`).join('');
}

// Init
buildGrid();
// Only auto-load world news on start - Israeli panels load on demand
setTimeout(async () => {
  if (ANTHROPIC_KEY) {
    await fetchPanel('world-news');
    await fetchPanel('world-celeb');
  }
}, 400);
// Auto-refresh every 15 minutes (Claude API has cost - don't over-refresh)
setInterval(() => {
  PANELS.forEach(p => {
    // Only refresh if tab has been viewed (items exist)
    if (Object.keys(state[p.id].items).length > 0) fetchPanel(p.id);
  });
}, 15 * 60 * 1000);
</script>
</body>
